name: Deploy Firebase Functions & Firestore

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firestore.*"
      - "data/marketplace/**"
      - "firebase.json"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa-key.json"

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Seed marketplace data
        run: cd functions && npm run seed
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa-key.json

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Clean up key file
        if: always()
        run: rm -f "$RUNNER_TEMP/sa-key.json"
